services:
  - type: web
    name: writer-fingerprint
    env: python
    runtime: python312
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./app/data/fingerprint.db
    plan: free
